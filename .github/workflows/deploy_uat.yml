---

name: Build Docker images and deploy to UAT
on:
  pull_request_target:
    types:
      - labeled
jobs:
  build_and_deploy:
    if: contains(github.event.pull_request.labels.*.name, 'deploy uat')
    runs-on: ubuntu-latest
    permissions:
      packages: write
      issues: read
      contents: read
    environment:
      name: UAT
      url: https://pr-${{ github.event.number }}.docsuat.devops.ans.uk
    steps:
      - name: Checkout the repository
        uses: actions/checkout@v3
        with:
          ref: "refs/pull/${{ github.event.number }}/merge"

      - name: Set up Docker buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push app image
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: ghcr.io/ans-group/new-docs-app:${{ github.event.number }}

      - name: 'Deploy'
        uses: 'vimeda/helm@v1.7.0'
        with:
          release: new-docs-uat-${{ github.event.number }}
          chart: .helm
          token: ${{ secrets.GITHUB_TOKEN }}
          values: |
            image:
              tag: ${{ github.event.number }}
              pullPolicy: Always
            ingress:
              host: pr-new-${{ github.event.number }}.docsuat.devops.ans.uk
              tls:
                secretName: docsuat-devops-ans-uk-tls
              certManager:
                enabled: false
            deployment:
              forceRestart: true
        env:
          KUBECONFIG_FILE: '${{ secrets.UAT_KUBECONFIG_ANS }}'
