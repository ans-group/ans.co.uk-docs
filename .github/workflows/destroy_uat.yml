---

name: Teardown UAT environment for this PR
on:
  workflow_dispatch: {}
  pull_request_target:
    types:
      - closed
jobs:
  teardown:
    if: contains(github.event.pull_request.labels.*.name, 'deploy uat')
    runs-on: ubuntu-latest
    permissions:
      packages: write
    environment:
      name: UAT
    steps:
      - name: 'Uninstall Helm Release'
        uses: 'vimeda/helm@v1.7.0'
        with:
          release: new-docs-uat-${{ github.event.number }}
          namespace: docs-uat
          chart: .helm
          token: ${{ secrets.GITHUB_TOKEN }}
          task: remove
        env:
          KUBECONFIG_FILE: '${{ secrets.UAT_KUBECONFIG_ANS }}'

      - name: Remove the app container image from the registry
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PACKAGE_NAME="new-docs-app"
          TAG="uat-${{ github.event.number }}"
          VERSION_ID=$(gh api \
            -H "Accept: application/vnd.github+json" \
            "/orgs/ans-group/packages/container/${PACKAGE_NAME}/versions" \
            --jq ".[] | select(.metadata.container.tags[] == \"${TAG}\") | .id")
          if [ -n "$VERSION_ID" ]; then
            gh api --method DELETE \
              -H "Accept: application/vnd.github+json" \
              "/orgs/ans-group/packages/container/${PACKAGE_NAME}/versions/${VERSION_ID}"
            echo "Deleted version ${VERSION_ID} (tag: ${TAG})"
          else
            echo "No version found with tag: ${TAG}"
          fi
        continue-on-error: true
