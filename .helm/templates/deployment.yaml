apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ans-docs.fullname" . }}
  labels:
    {{- include "ans-docs.labels" . | nindent 4 }}
spec:
  replicas: 2
  selector:
    matchLabels:
      {{- include "ans-docs.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ans-docs.selectorLabels" . | nindent 8 }}
      {{- if .Values.deployment.forceRestart }}
      annotations:
        deployment.timestamp: "{{ now | unixEpoch }}"
      {{- end }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 80
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          resources:
            limits:
              cpu: 500m
              memory: 512Mi
            requests:
              cpu: 100m
              memory: 128Mi