apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: {{ include "ans-docs.fullname" . }}
  labels:
    {{- include "ans-docs.labels" . | nindent 4 }}
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-http
spec:
  tls:
    - hosts:
        - {{ .Values.ingress.host }}
  rules:
    - host: {{ .Values.ingress.host }}
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: {{ include "ans-docs.fullname" . }}
                port:
                  number: 80